<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全私密聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --primary: #1677ff;
            --bg: #f5f7fa;
            --white: #ffffff;
            --text: #333333;
            --text-secondary: #666666;
            --border: #e8e8e8;
            --msg-mine: #95ec69;
            --msg-other: var(--white);
        }
        body {
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
        }
        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部导航栏 */
        .header {
            background: var(--white);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }
        .header-actions {
            display: flex;
            gap: 16px;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            color: var(--primary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .icon-btn:hover {
            background: var(--primary);
            color: var(--white);
        }
        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg);
            scroll-behavior: smooth;
        }
        .msg-item {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }
        .msg-item.mine {
            flex-direction: row-reverse;
        }
        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }
        .msg-item.mine .msg-avatar {
            background: #52c41a;
        }
        .msg-content {
            max-width: 70%;
            margin: 0 12px;
        }
        .msg-name {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .msg-item.mine .msg-name {
            text-align: right;
        }
        .msg-bubble {
            padding: 10px 14px;
            border-radius: 8px;
            background: var(--msg-other);
            color: var(--text);
            word-break: break-all;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative;
        }
        .msg-item.mine .msg-bubble {
            background: var(--msg-mine);
        }
        .msg-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        .msg-item.mine .msg-time {
            text-align: right;
        }
        /* 底部输入框 */
        .input-area {
            background: var(--white);
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        .input-actions {
            display: flex;
            gap: 8px;
            padding-bottom: 4px;
        }
        .input-box {
            flex: 1;
            background: var(--bg);
            border-radius: 20px;
            padding: 10px 16px;
            max-height: 120px;
            overflow-y: auto;
            outline: none;
            border: none;
            font-size: 16px;
            line-height: 1.5;
        }
        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: var(--white);
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .send-btn:hover {
            background: #4096ff;
        }
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        /* 表情包面板 */
        .emoji-panel {
            background: var(--white);
            border-top: 1px solid var(--border);
            padding: 12px;
            display: none;
        }
        .emoji-panel.show {
            display: block;
        }
        .emoji-list {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
        }
        .emoji-item {
            font-size: 24px;
            text-align: center;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .emoji-item:hover {
            background: var(--bg);
        }
        /* 阅后即焚标记 */
        .burn-mark {
            font-size: 10px;
            color: #ff4d4f;
            margin-top: 2px;
        }
        /* 动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* 响应式适配 */
        @media (max-width: 768px) {
            .msg-content {
                max-width: 80%;
            }
        }
        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: var(--white);
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        .modal-btns {
            display: flex;
            gap: 12px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-cancel {
            background: var(--bg);
            color: var(--text);
        }
        .btn-confirm {
            background: var(--primary);
            color: var(--white);
        }
        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 320px;
            height: 100%;
            background: var(--white);
            z-index: 2000;
            transition: 0.3s ease;
            padding: 24px 16px;
            overflow-y: auto;
        }
        .settings-panel.show {
            right: 0;
        }
        .settings-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .settings-item {
            margin-bottom: 20px;
        }
        .settings-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }
        .color-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color-option.active {
            border-color: var(--primary);
        }
        .switch-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .switch {
            width: 44px;
            height: 24px;
            background: #ccc;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .switch.active {
            background: var(--primary);
        }
        .switch-dot {
            width: 20px;
            height: 20px;
            background: var(--white);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .switch.active .switch-dot {
            left: 22px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="header-title" id="chatTitle">私密聊天</div>
            <div class="header-actions">
                <button class="icon-btn" id="addFriendBtn" title="添加好友">👤</button>
                <button class="icon-btn" id="callBtn" title="通话">📞</button>
                <button class="icon-btn" id="settingsBtn" title="设置">⚙️</button>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer"></div>

        <!-- 表情包面板 -->
        <div class="emoji-panel" id="emojiPanel">
            <div class="emoji-list" id="emojiList"></div>
        </div>

        <!-- 底部输入区 -->
        <div class="input-area">
            <div class="input-actions">
                <button class="icon-btn" id="emojiBtn" title="表情包">😊</button>
                <button class="icon-btn" id="burnBtn" title="阅后即焚">🔥</button>
            </div>
            <div class="input-box" id="inputBox" contenteditable="true" placeholder="输入消息..."></div>
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>

    <!-- 昵称设置模态框 -->
    <div class="modal" id="nameModal">
        <div class="modal-content">
            <div class="modal-title">设置你的昵称</div>
            <input type="text" class="modal-input" id="nameInput" placeholder="请输入你的昵称" maxlength="10">
            <div class="modal-btns">
                <button class="modal-btn btn-confirm" id="nameConfirmBtn">确认</button>
            </div>
        </div>
    </div>

    <!-- 添加好友模态框 -->
    <div class="modal" id="friendModal">
        <div class="modal-content">
            <div class="modal-title">添加聊天好友</div>
            <input type="text" class="modal-input" id="friendInput" placeholder="请输入好友昵称" maxlength="10">
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" id="friendCancelBtn">取消</button>
                <button class="modal-btn btn-confirm" id="friendConfirmBtn">确认</button>
            </div>
        </div>
    </div>

    <!-- 通话提示模态框 -->
    <div class="modal" id="callModal">
        <div class="modal-content">
            <div class="modal-title" id="callTitle">语音通话</div>
            <div style="text-align: center; font-size: 48px; margin: 20px 0;">📞</div>
            <div style="text-align: center; margin-bottom: 20px;" id="callStatus">正在呼叫...</div>
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" id="callHangupBtn">挂断</button>
                <button class="modal-btn btn-confirm" id="callAcceptBtn">接听</button>
            </div>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">设置</div>
        
        <div class="settings-item">
            <label class="settings-label">聊天背景</label>
            <div class="color-options">
                <div class="color-option active" style="background: #f5f7fa;" data-bg="#f5f7fa"></div>
                <div class="color-option" style="background: #e8f4fd;" data-bg="#e8f4fd"></div>
                <div class="color-option" style="background: #f0f9eb;" data-bg="#f0f9eb"></div>
                <div class="color-option" style="background: #fff2e8;" data-bg="#fff2e8"></div>
                <div class="color-option" style="background: #f9f0ff;" data-bg="#f9f0ff"></div>
                <div class="color-option" style="background: #000000;" data-bg="#000000"></div>
            </div>
        </div>

        <div class="settings-item">
            <div class="switch-item">
                <label class="settings-label">默认开启阅后即焚</label>
                <div class="switch" id="defaultBurnSwitch">
                    <div class="switch-dot"></div>
                </div>
            </div>
        </div>

        <div class="settings-item">
            <div class="switch-item">
                <label class="settings-label">深色模式</label>
                <div class="switch" id="darkModeSwitch">
                    <div class="switch-dot"></div>
                </div>
            </div>
        </div>

        <div class="settings-item">
            <button class="modal-btn btn-confirm" style="width: 100%; margin-top: 20px;" id="shareBtn">分享应用</button>
        </div>

        <div class="settings-item">
            <button class="modal-btn btn-cancel" style="width: 100%;" id="closeSettingsBtn">关闭设置</button>
        </div>
    </div>

    <script>
        // 全局变量
        let myName = '';
        let friendName = '好友';
        let isBurnMode = false;
        let defaultBurn = false;
        const emojis = ['😊','😂','🤣','😅','😆','😉','😍','😘','🥰','😗','😙','😚','😋','😛','😜','😝','🤑','🤗','🤩','🤔','🤨','😐','😑','😶','🙄','😏','😣','😥','😮','🤐','😯','😪','😫','🥱','😴','😌','😛','😜','😝','🤤','😒','😓','😔','😕','🙃','🤑','😲','☹️','🙁','😖','😞','😟','😤','😢','😭','😦','😧','😨','😩','🤯','😬','😰','😱','😳','🤪','😵','😡','😠','🤬','😷','🤒','🤕','🤢','🤮','🤧','😇','🥳','🥺','🤠','🤡','🤫','🤭','🧐','🤓','😈','👿','👹','👺','💀','👻','👽','🤖','💩','😺','😸','😹','😻','😼','😽','🙀','😿','😾'];

        // DOM元素
        const chatContainer = document.getElementById('chatContainer');
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPanel = document.getElementById('emojiPanel');
        const emojiList = document.getElementById('emojiList');
        const burnBtn = document.getElementById('burnBtn');
        const nameModal = document.getElementById('nameModal');
        const nameInput = document.getElementById('nameInput');
        const nameConfirmBtn = document.getElementById('nameConfirmBtn');
        const addFriendBtn = document.getElementById('addFriendBtn');
        const friendModal = document.getElementById('friendModal');
        const friendInput = document.getElementById('friendInput');
        const friendCancelBtn = document.getElementById('friendCancelBtn');
        const friendConfirmBtn = document.getElementById('friendConfirmBtn');
        const chatTitle = document.getElementById('chatTitle');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const callBtn = document.getElementById('callBtn');
        const callModal = document.getElementById('callModal');
        const callHangupBtn = document.getElementById('callHangupBtn');
        const callAcceptBtn = document.getElementById('callAcceptBtn');
        const callTitle = document.getElementById('callTitle');
        const callStatus = document.getElementById('callStatus');
        const defaultBurnSwitch = document.getElementById('defaultBurnSwitch');
        const darkModeSwitch = document.getElementById('darkModeSwitch');
        const colorOptions = document.querySelectorAll('.color-option');
        const shareBtn = document.getElementById('shareBtn');

        // 初始化
        init();

        function init() {
            // 显示昵称设置
            nameModal.classList.add('show');

            // 初始化表情包
            initEmoji();

            // 绑定事件
            bindEvents();
        }

        // 初始化表情包
        function initEmoji() {
            emojis.forEach(emoji => {
                const div = document.createElement('div');
                div.className = 'emoji-item';
                div.textContent = emoji;
                div.onclick = () => {
                    inputBox.textContent += emoji;
                    inputBox.focus();
                };
                emojiList.appendChild(div);
            });
        }

        // 绑定所有事件
        function bindEvents() {
            // 昵称确认
            nameConfirmBtn.onclick = () => {
                const name = nameInput.value.trim();
                if (!name) {
                    alert('请输入昵称');
                    return;
                }
                myName = name;
                nameModal.classList.remove('show');
                inputBox.focus();
            };

            // 发送消息
            sendBtn.onclick = sendMsg;
            inputBox.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMsg();
                }
            });

            // 输入框内容变化
            inputBox.addEventListener('input', () => {
                sendBtn.disabled = inputBox.textContent.trim() === '';
            });

            // 表情包开关
            emojiBtn.onclick = () => {
                emojiPanel.classList.toggle('show');
            };

            // 阅后即焚开关
            burnBtn.onclick = () => {
                isBurnMode = !isBurnMode;
                burnBtn.style.background = isBurnMode ? '#ff4d4f' : 'var(--bg)';
                burnBtn.style.color = isBurnMode ? '#fff' : 'var(--primary)';
            };

            // 添加好友
            addFriendBtn.onclick = () => {
                friendModal.classList.add('show');
                friendInput.value = '';
                friendInput.focus();
            };

            // 好友模态框取消
            friendCancelBtn.onclick = () => {
                friendModal.classList.remove('show');
            };

            // 好友确认
            friendConfirmBtn.onclick = () => {
                const name = friendInput.value.trim();
                if (!name) {
                    alert('请输入好友昵称');
                    return;
                }
                friendName = name;
                chatTitle.textContent = `与${friendName}聊天`;
                friendModal.classList.remove('show');
                addSystemMsg(`已添加${friendName}为好友，开始聊天吧`);
            };

            // 设置面板开关
            settingsBtn.onclick = () => {
                settingsPanel.classList.add('show');
            };
            closeSettingsBtn.onclick = () => {
                settingsPanel.classList.remove('show');
            };

            // 通话按钮
            callBtn.onclick = () => {
                callModal.classList.add('show');
                callTitle.textContent = `与${friendName}语音通话`;
                callStatus.textContent = `正在呼叫${friendName}...`;
                callAcceptBtn.style.display = 'none';
                setTimeout(() => {
                    callStatus.textContent = `${friendName}的来电`;
                    callAcceptBtn.style.display = 'block';
                }, 2000);
            };

            // 挂断通话
            callHangupBtn.onclick = () => {
                callModal.classList.remove('show');
                addSystemMsg('通话已结束');
            };

            // 接听通话
            callAcceptBtn.onclick = () => {
                callStatus.textContent = '通话中...';
                callAcceptBtn.style.display = 'none';
                setTimeout(() => {
                    callModal.classList.remove('show');
                    addSystemMsg('通话已结束，时长01:23');
                }, 3000);
            };

            // 默认阅后即焚开关
            defaultBurnSwitch.onclick = () => {
                defaultBurn = !defaultBurn;
                defaultBurnSwitch.classList.toggle('active', defaultBurn);
                isBurnMode = defaultBurn;
                burnBtn.style.background = isBurnMode ? '#ff4d4f' : 'var(--bg)';
                burnBtn.style.color = isBurnMode ? '#fff' : 'var(--primary)';
            };

            // 深色模式开关
            darkModeSwitch.onclick = () => {
                const isDark = darkModeSwitch.classList.toggle('active');
                document.documentElement.style.setProperty('--bg', isDark ? '#121212' : '#f5f7fa');
                document.documentElement.style.setProperty('--white', isDark ? '#1e1e1e' : '#ffffff');
                document.documentElement.style.setProperty('--text', isDark ? '#ffffff' : '#333333');
                document.documentElement.style.setProperty('--text-secondary', isDark ? '#aaaaaa' : '#666666');
                document.documentElement.style.setProperty('--border', isDark ? '#333333' : '#e8e8e8');
            };

            // 背景颜色选择
            colorOptions.forEach(option => {
                option.onclick = () => {
                    const bg = option.getAttribute('data-bg');
                    document.documentElement.style.setProperty('--bg', bg);
                    colorOptions.forEach(opt => opt.classList.remove('active'));
                    option.classList.add('active');
                };
            });

            // 分享按钮
            shareBtn.onclick = () => {
                const url = window.location.href;
                if (navigator.share) {
                    navigator.share({
                        title: '安全私密聊天',
                        text: '快来和我一起用这个安全的聊天应用吧',
                        url: url
                    });
                } else {
                    navigator.clipboard.writeText(url).then(() => {
                        alert('应用链接已复制到剪贴板，快去分享给好友吧');
                    });
                }
            };

            // 点击空白关闭表情包面板
            document.addEventListener('click', (e) => {
                if (!emojiBtn.contains(e.target) && !emojiPanel.contains(e.target)) {
                    emojiPanel.classList.remove('show');
                }
            });
        }

        // 发送消息
        function sendMsg() {
            const content = inputBox.textContent.trim();
            if (!content) return;

            // 添加自己的消息
            addMsg(content, 'mine');

            // 清空输入框
            inputBox.textContent = '';
            sendBtn.disabled = true;
            emojiPanel.classList.remove('show');

            // 自动回复
            setTimeout(() => {
                const replies = [
                    '好的，我知道了',
                    '收到啦',
                    '哈哈哈哈太好笑了',
                    '嗯嗯',
                    '你说得对',
                    '没问题',
                    '晚点说，我现在有点忙',
                    '好呀好呀',
                    '可以的',
                    '我刚看到消息'
                ];
                const randomReply = replies[Math.floor(Math.random() * replies.length)];
                addMsg(randomReply, 'other');
            }, 1000 + Math.random() * 2000);
        }

        // 添加消息到聊天框
        function addMsg(content, type) {
            const isMine = type === 'mine';
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg-item ${type}`;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const name = isMine ? myName : friendName;

            msgDiv.innerHTML = `
                <div class="msg-avatar">${name.charAt(0)}</div>
                <div class="msg-content">
                    <div class="msg-name">${name}</div>
                    <div class="msg-bubble">${content}</div>
                    <div class="msg-time">${time}</div>
                    ${isBurnMode ? '<div class="burn-mark">🔥 阅后即焚</div>' : ''}
                </div>
            `;

            chatContainer.appendChild(msgDiv);
            scrollToBottom();

            // 阅后即焚处理
            if (isBurnMode) {
                setTimeout(() => {
                    msgDiv.style.opacity = '0';
                    setTimeout(() => {
                        msgDiv.remove();
                    }, 300);
                }, 10000);
            }
        }

        // 添加系统消息
        function addSystemMsg(content) {
            const sysDiv = document.createElement('div');
            sysDiv.style.textAlign = 'center';
            sysDiv.style.margin = '12px 0';
            sysDiv.innerHTML = `<span style="font-size: 12px; color: #999; background: var(--bg); padding: 4px 8px; border-radius: 4px;">${content}</span>`;
            chatContainer.appendChild(sysDiv);
            scrollToBottom();
        }

        // 滚动到底部
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
